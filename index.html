<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KasirAja - Dashboard & POS System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800">

    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-cash-register text-2xl text-indigo-600"></i>
                    <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">KasirAja</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full font-medium">
                        <i class="fa-solid fa-user-badge mr-1"></i> Kasir Utama
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-6 rounded-2xl shadow-xs border border-gray-100">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">Katalog Produk</h1>
                        <p class="text-sm text-gray-500">Pilih produk untuk dimasukkan ke keranjang</p>
                    </div>
                    <div class="relative w-full sm:w-64">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-input" placeholder="Cari produk..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm transition-all">
                    </div>
                </div>

                <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-xs border border-gray-100 p-6 sticky top-24 flex flex-col h-[calc(100vh-8rem)]">
                    <div class="flex justify-between items-center pb-4 border-b border-gray-100">
                        <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                            <i class="fa-solid fa-shopping-cart text-indigo-600"></i> Keranjang Belanja
                        </h2>
                        <span id="cart-count" class="bg-indigo-600 text-white text-xs px-2.5 py-1 rounded-full font-semibold">0</span>
                    </div>

                    <div id="cart-items" class="flex-1 overflow-y-auto py-4 space-y-4 pr-1">
                        <div id="cart-empty" class="text-center py-12 text-gray-400">
                            <i class="fa-solid fa-basket-shopping text-4xl mb-3 block"></i>
                            <p class="text-sm">Keranjang masih kosong</p>
                        </div>
                    </div>

                    <div class="border-t border-gray-100 pt-4 space-y-3">
                        <div class="flex justify-between text-sm text-gray-600">
                            <span>Subtotal</span>
                            <span id="subtotal">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-sm text-gray-600">
                            <span>Pajak (11%)</span>
                            <span id="tax">Rp 0</span>
                        </div>
                        <hr class="border-dashed border-gray-200">
                        <div class="flex justify-between text-base font-bold text-gray-900">
                            <span>Total Akhir</span>
                            <span id="total-price" class="text-indigo-600">Rp 0</span>
                        </div>
                        
                        <!-- Bayar Button -->
                        <button id="checkout-btn" disabled class="w-full mt-2 bg-gray-300 text-gray-500 font-semibold py-3 px-4 rounded-xl cursor-not-allowed transition-all duration-200 flex justify-center items-center gap-2 hover:shadow-lg active:scale-[0.98]">
                            <i class="fa-solid fa-cash-register"></i> Proses Transaksi
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const products = [
            { id: 1, name: "Kopi Susu Gula Aren", price: 18000, category: "Minuman", image: "https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&q=80&w=400" },
            { id: 2, name: "Croissant Almond", price: 25000, category: "Makanan", image: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&q=80&w=400" },
            { id: 3, name: "Ice Matcha Latte", price: 22000, category: "Minuman", image: "https://images.unsplash.com/photo-1536256263959-770b48d82b0a?auto=format&fit=crop&q=80&w=400" },
            { id: 4, name: "Spaghetti Carbonara", price: 35000, category: "Makanan", image: "https://images.unsplash.com/photo-1612874742237-6526221588e3?auto=format&fit=crop&q=80&w=400" },
            { id: 5, name: "French Fries XL", price: 15000, category: "Cemilan", image: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&q=80&w=400" },
            { id: 6, name: "Choco Lava Cake", price: 20000, category: "Makanan", image: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&q=80&w=400" }
        ];

        let cart = [];

        const productGrid = document.getElementById('product-grid');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartEmptyState = document.getElementById('cart-empty');
        const cartCount = document.getElementById('cart-count');
        const subtotalEl = document.getElementById('subtotal');
        const taxEl = document.getElementById('tax');
        const totalPriceEl = document.getElementById('total-price');
        const checkoutBtn = document.getElementById('checkout-btn');
        const searchInput = document.getElementById('search-input');

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        function displayProducts(filteredProducts = products) {
            productGrid.innerHTML = '';
            
            if(filteredProducts.length === 0) {
                productGrid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-400">
                        <i class="fa-solid fa-box-open text-4xl mb-2"></i>
                        <p>Produk tidak ditemukan</p>
                    </div>
                `;
                return;
            }

            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl overflow-hidden shadow-xs border border-gray-100 hover:shadow-md transition-all duration-200 flex flex-col group";
                card.innerHTML = `
                    <div class="relative overflow-hidden h-44 bg-gray-100">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                        <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-xs text-xs font-semibold px-2.5 py-1 rounded-lg text-indigo-600 shadow-xs">${product.category}</span>
                    </div>
                    <div class="p-5 flex flex-col flex-1 justify-between gap-4">
                        <div>
                            <h3 class="font-bold text-gray-900 text-base mb-1 line-clamp-1">${product.name}</h3>
                            <p class="text-indigo-600 font-extrabold text-lg">${formatRupiah(product.price)}</p>
                        </div>
                        <button onclick="addToCart(${product.id})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-xl transition-colors duration-150 flex items-center justify-center gap-2 text-sm shadow-sm shadow-indigo-100">
                            <i class="fa-solid fa-plus text-xs"></i> Tambah
                        </button>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const cartItem = cart.find(item => item.id === productId);

            if (cartItem) {
                cartItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCartUI();
        }

        function changeQuantity(productId, action) {
            const cartItem = cart.find(item => item.id === productId);
            
            if (action === 'increase') {
                cartItem.quantity += 1;
            } else if (action === 'decrease') {
                cartItem.quantity -= 1;
                if (cartItem.quantity === 0) {
                    cart = cart.filter(item => item.id !== productId);
                }
            }
            
            updateCartUI();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        function updateCartUI() {
            // Urus Tampilan Item
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '';
                cartItemsContainer.appendChild(cartEmptyState);
                checkoutBtn.disabled = true;
                checkoutBtn.className = "w-full mt-2 bg-gray-200 text-gray-400 font-semibold py-3 px-4 rounded-xl cursor-not-allowed transition-all";
            } else {
                if(document.getElementById('cart-empty')) {
                    cartEmptyState.remove();
                }
                
                cartItemsContainer.innerHTML = '';
                cart.forEach(item => {
                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between gap-3 p-3 bg-gray-50 rounded-xl border border-gray-100 animate-fadeIn";
                    row.innerHTML = `
                        <div class="flex items-center gap-3 min-w-0">
                            <img src="${item.image}" class="w-12 h-12 object-cover rounded-lg bg-gray-200 flex-shrink-0">
                            <div class="min-w-0">
                                <h4 class="font-bold text-sm text-gray-900 truncate">${item.name}</h4>
                                <p class="text-xs text-gray-500">${formatRupiah(item.price)}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 flex-shrink-0">
                            <div class="flex items-center bg-white border border-gray-200 rounded-lg overflow-hidden shadow-2xs">
                                <button onclick="changeQuantity(${item.id}, 'decrease')" class="px-2 py-1 text-xs hover:bg-gray-100 text-gray-600 transition-colors"><i class="fa-solid fa-minus"></i></button>
                                <span class="px-2 text-xs font-bold text-gray-800">${item.quantity}</span>
                                <button onclick="changeQuantity(${item.id}, 'increase')" class="px-2 py-1 text-xs hover:bg-gray-100 text-gray-600 transition-colors"><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <button onclick="removeFromCart(${item.id})" class="text-gray-400 hover:text-red-500 transition-colors p-1"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                    `;
                    cartItemsContainer.appendChild(row);
                });

                checkoutBtn.disabled = false;
                checkoutBtn.className = "w-full mt-2 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md shadow-indigo-100 transition-all cursor-pointer";
            }

            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.11; // PPN 11%
            const totalPrice = subtotal + tax;

            cartCount.textContent = totalItems;
            subtotalEl.textContent = formatRupiah(subtotal);
            taxEl.textContent = formatRupiah(tax);
            totalPriceEl.textContent = formatRupiah(totalPrice);
        }

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = products.filter(product => 
                product.name.toLowerCase().includes(keyword) || 
                product.category.toLowerCase().includes(keyword)
            );
            displayProducts(filtered);
        });

        checkoutBtn.addEventListener('click', () => {
            alert(`🎉 Transaksi Sukses!\nTotal Pembayaran: ${totalPriceEl.textContent}\nTerima kasih sudah berbelanja.`);
            cart = [];
            updateCartUI();
        });

        displayProducts();
    </script>
</body>
</html>
